<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UUV闭环仿真</title>
    <link rel="stylesheet" href="/styles.css?v=pilot-feedback" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>UUV闭环仿真</h1>
            <p id="statusText">坐标系 0～2000，分辨率 1m，起点 (0,0)</p>
          </div>
          <span id="simulationBadge">待运行</span>
        </header>

        <section class="main-grid">
          <section class="input-panel">
            <div class="panel-title">
              <h2>参数设置</h2>
            </div>
            <div class="input-form">
              <section class="field-group">
                <div class="section-title">
                  <h3>真实饵物坐标</h3>
                  <button id="addTargetBtn" type="button">添加目标</button>
                </div>
                <div id="targetRows" class="target-list"></div>
              </section>

              <section class="field-group">
                <label for="discoveryRangeInput">发现距离 m</label>
                <input id="discoveryRangeInput" type="number" min="1" step="1" value="50" />
              </section>

              <section class="field-group">
                <label for="dialogInput">对话输入</label>
                <textarea id="dialogInput" rows="6" spellcheck="false">根据探测到的方位，逐目标抵近侦察。</textarea>
              </section>

              <button id="runSimulationBtn" type="button" class="primary">开始仿真</button>
            </div>
          </section>

          <section class="output-grid">
            <section class="output-panel trajectory-panel">
              <div class="panel-title">
                <h2>平面轨迹动画</h2>
              </div>
              <canvas id="trajectoryCanvas"></canvas>
            </section>

            <section class="output-panel bearing-panel">
              <div class="panel-title">
                <h2>多次探测角度记录</h2>
              </div>
              <canvas id="bearingCanvas"></canvas>
            </section>

            <section class="output-panel agent-panel">
              <div class="panel-title">
                <h2>Agent思考与执行</h2>
              </div>
              <div class="agent-output-grid">
                <section class="agent-column">
                  <h3>思考过程</h3>
                  <pre id="agentThoughts">等待仿真。</pre>
                </section>
                <section class="agent-column">
                  <h3>驾驶员反馈</h3>
                  <pre id="pilotReport">等待仿真。</pre>
                </section>
              </div>
            </section>
          </section>
        </section>
      </section>
    </main>
    <script src="/app.js?v=depth-feedback"></script>
  </body>
</html>
